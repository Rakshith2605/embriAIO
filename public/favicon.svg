<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Parchment background -->
  <rect width="32" height="32" fill="#F7F2E7"/>
  <!-- Gold border -->
  <rect x="1" y="1" width="30" height="30" fill="none" stroke="#C8B882" stroke-width="1.5"/>
  <!-- Rust left accent bar (matching the design's 3px left border pattern) -->
  <rect x="1" y="1" width="3" height="30" fill="#C0392B"/>
  <!-- Section symbol in parchment ink -->
  <text
    x="18"
    y="23"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-weight="700"
    font-size="19"
    fill="#1C1610"
  >§</text>
</svg>
