  <circle cx="261" cy="96" r="4.5" fill="#085041" stroke="#5dcaa5" stroke-width="1"/>
  <circle cx="207" cy="96" r="4.5" fill="#085041" stroke="#5dcaa5" stroke-width="1"/>
